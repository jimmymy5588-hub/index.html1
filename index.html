<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buku Kas — Dashboard Budgeting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #0A0E13;
    --surface: #11161D;
    --surface-2: #171E27;
    --surface-3: #1E2630;
    --border: #232C38;
    --text: #E8EDF2;
    --text-muted: #8A99A8;
    --text-faint: #586573;
    --income: #34D399;
    --income-dim: rgba(52,211,153,0.12);
    --expense: #FB7185;
    --expense-dim: rgba(251,113,133,0.12);
    --savings: #FBBF24;
    --savings-dim: rgba(251,191,36,0.12);
    --accent: #5EEAD4;
    --danger: #F87171;
    --radius: 10px;
    --font-display: 'Space Grotesk', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --font-body: 'Inter', sans-serif;
  }

  :root[data-theme="light"]{
    --bg: #F4F2EC;
    --surface: #FFFFFF;
    --surface-2: #F1EEE6;
    --surface-3: #E6E1D5;
    --border: #DEDACE;
    --text: #1B2026;
    --text-muted: #5B6470;
    --text-faint: #8C93A0;
    --income: #0E9D6E;
    --income-dim: rgba(14,157,110,0.10);
    --expense: #E11D48;
    --expense-dim: rgba(225,29,72,0.08);
    --savings: #B8740A;
    --savings-dim: rgba(184,116,10,0.10);
    --accent: #0E8C82;
    --danger: #DC2626;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }
  html,body{ background: var(--bg); color: var(--text); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
  body{ min-height: 100vh; padding-bottom: 60px; transition: background .2s ease, color .2s ease; }

  ::selection{ background: var(--accent); color: #0A0E13; }

  ::-webkit-scrollbar{ width: 8px; height: 8px; }
  ::-webkit-scrollbar-track{ background: var(--surface); }
  ::-webkit-scrollbar-thumb{ background: var(--surface-3); border-radius: 4px; }

  .app{ max-width: 1280px; margin: 0 auto; padding: 24px 28px; }

  .topbar{ display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom: 28px; flex-wrap: wrap; }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-mark{ width:34px; height:34px; border-radius: 8px; background: linear-gradient(135deg, var(--income), var(--accent)); display:flex; align-items:center; justify-content:center; font-family: var(--font-mono); font-weight:700; color:#0A0E13; font-size:15px; }
  .brand-text{ font-family: var(--font-display); font-weight:700; font-size: 18px; letter-spacing: -0.02em; }
  .brand-sub{ font-size: 11px; color: var(--text-faint); font-family: var(--font-mono); letter-spacing: 0.04em; }

  .month-nav{ display:flex; align-items:center; gap:4px; background: var(--surface); border:1px solid var(--border); border-radius: 999px; padding: 4px; }
  .month-nav button{ width:30px; height:30px; border-radius:999px; border:none; background:transparent; color: var(--text-muted); cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; transition: background .15s, color .15s; }
  .month-nav button:hover{ background: var(--surface-3); color: var(--text); }
  .month-nav .month-label{ font-family: var(--font-mono); font-size: 13px; font-weight:600; min-width: 132px; text-align:center; letter-spacing: 0.01em; }

  .topbar-actions{ display:flex; align-items:center; gap:8px; }

  .btn-primary{ background: var(--income); color:#06231A; border:none; font-family: var(--font-body); font-weight:600; font-size: 13.5px; padding: 10px 18px; border-radius: 999px; cursor:pointer; display:flex; align-items:center; gap:6px; transition: transform .12s, box-shadow .12s; white-space:nowrap; }
  :root[data-theme="light"] .btn-primary{ color:#FFFFFF; }
  .btn-primary:hover{ transform: translateY(-1px); box-shadow: 0 4px 14px rgba(52,211,153,0.25); }
  .btn-primary:active{ transform: translateY(0); }

  .btn-ghost{ background: var(--surface-2); color: var(--text-muted); border:1px solid var(--border); font-size:12.5px; font-weight:600; padding: 6px 12px; border-radius: 8px; cursor:pointer; font-family: var(--font-body); transition: all .15s; }
  .btn-ghost:hover{ color: var(--text); border-color: var(--text-faint); }

  .icon-circle-btn{ width:36px; height:36px; border-radius:999px; border:1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; transition: all .15s; }
  .icon-circle-btn:hover{ color: var(--text); border-color: var(--text-faint); }

  .hero{ display:grid; grid-template-columns: 1.1fr 2fr; gap: 16px; margin-bottom: 18px; }
  .hero-balance{ background: linear-gradient(160deg, var(--surface-2), var(--surface)); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; position: relative; overflow:hidden; display:flex; flex-direction:column; justify-content:center; }
